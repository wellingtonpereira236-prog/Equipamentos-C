<meta charset="UTF-8">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0f1923;
    color: #e2e8f0;
    font-family: 'Roboto Mono', 'Courier New', monospace;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  header {
    background: #162233;
    border-bottom: 2px solid #f59e0b;
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-sub { font-size: 11px; letter-spacing: 3px; color: #f59e0b; margin-bottom: 4px; text-transform: uppercase; }
  .header-title { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 1px; }
  .search-area { padding: 20px 20px 0; }
  .label { font-size: 11px; color: #94a3b8; margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase; }

  /* Toggle mode */
  .mode-toggle {
    display: flex;
    background: #1e2d3d;
    border: 1.5px solid #2d4a6a;
    border-radius: 8px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .mode-btn {
    flex: 1;
    padding: 10px;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    background: transparent;
    color: #64748b;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .mode-btn.active {
    background: #f59e0b;
    color: #0f1923;
  }

  .input-row { display: flex; gap: 10px; }
  input[type=text] {
    flex: 1;
    background: #1e2d3d;
    border: 1.5px solid #2d4a6a;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 16px;
    color: #e2e8f0;
    letter-spacing: 1px;
    outline: none;
    font-family: inherit;
  }
  input[type=text]::placeholder { color: #4a5568; }
  input[type=text]:focus { border-color: #f59e0b; }
  #input-tag { text-transform: uppercase; }
  #btn-clear {
    display: none;
    background: #1e2d3d;
    border: 1.5px solid #2d4a6a;
    border-radius: 8px;
    color: #94a3b8;
    padding: 0 16px;
    font-size: 18px;
    cursor: pointer;
  }
  #btn-search {
    margin-top: 12px;
    width: 100%;
    background: #f59e0b;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    color: #0f1923;
    letter-spacing: 1px;
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    -webkit-appearance: none;
  }
  #btn-search:active { background: #d97706; }
  .results { padding: 20px 20px 0; }
  .result-count { font-size: 11px; color: #94a3b8; margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }
  .not-found {
    background: #1e2d3d;
    border: 1px solid #ef4444;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    color: #ef4444;
    font-size: 14px;
  }
  .card {
    background: #162233;
    border: 1px solid #2d4a6a;
    border-left: 4px solid #f59e0b;
    border-radius: 10px;
    padding: 18px 16px;
    margin-bottom: 14px;
  }
  .card-tag-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .card-tag-label span:first-child { font-size: 11px; color: #f59e0b; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }
  .divider { flex: 1; height: 1px; background: #2d4a6a; }
  .tag-value { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: 1px; margin-bottom: 16px; word-break: break-all; }
  .field-label { font-size: 10px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .field-value { font-size: 14px; color: #e2e8f0; line-height: 1.5; }
  .field-value.empty { color: #ef4444; }
  .desc-block { margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .grid-cell {
    background: #0f1923;
    border: 1px solid #2d4a6a;
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }
  .grid-cell .field-label { margin-bottom: 6px; }
  .grid-cell .big { font-size: 22px; font-weight: 700; color: #ef4444; }
  .grid-cell .normal { font-size: 13px; font-weight: 700; color: #f59e0b; word-break: break-all; line-height: 1.2; }
  mark { background: #f59e0b33; color: #f59e0b; border-radius: 2px; padding: 0 1px; }
</style>

let mode = "tag";

const inputTag = document.getElementById("input-tag");
const inputDesc = document.getElementById("input-desc");
const btnClear = document.getElementById("btn-clear");
const inputLabel = document.getElementById("input-label");
const resultsDiv = document.getElementById("results");

function setMode(m) {
  mode = m;
  document.getElementById("btn-mode-tag").classList.toggle("active", m === "tag");
  document.getElementById("btn-mode-desc").classList.toggle("active", m === "desc");
  inputTag.style.display = m === "tag" ? "block" : "none";
  inputDesc.style.display = m === "desc" ? "block" : "none";
  inputLabel.textContent = m === "tag" ? "Tag do Equipamento" : "Descrição";
  btnClear.style.display = "none";
  resultsDiv.innerHTML = "";
  activeInput().focus();
}

function activeInput() {
  return mode === "tag" ? inputTag : inputDesc;
}

inputTag.addEventListener("input", () => {
  inputTag.value = inputTag.value.toUpperCase();
  btnClear.style.display = inputTag.value ? "block" : "none";
});
inputDesc.addEventListener("input", () => {
  inputDesc.value = inputDesc.value.toUpperCase();
  btnClear.style.display = inputDesc.value ? "block" : "none";
});
inputTag.addEventListener("keydown", e => { if (e.key === "Enter") search(); });
inputDesc.addEventListener("keydown", e => { if (e.key === "Enter") search(); });

function clearSearch() {
  inputTag.value = "";
  inputDesc.value = "";
  btnClear.style.display = "none";
  resultsDiv.innerHTML = "";
  activeInput().focus();
}

function search() {
  const q = activeInput().value.trim().toUpperCase();
  if (!q) return;
  let found;
  if (mode === "tag") {
    found = DATA.filter(r => r.tag && r.tag.toUpperCase().includes(q));
  } else {
    found = DATA.filter(r => r.descricao && r.descricao.toUpperCase().includes(q));
  }
  renderResults(found, q);
}

function highlight(text, q) {
  if (!text || !q) return text || "";
  const idx = text.toUpperCase().indexOf(q);
  if (idx === -1) return text;
  return text.slice(0, idx) + "<mark>" + text.slice(idx, idx + q.length) + "</mark>" + text.slice(idx + q.length);
}

const val = v => (v === null || v === undefined || v === "") ? "*" : String(v);

function renderResults(items, q) {
  if (items.length === 0) {
    resultsDiv.innerHTML = '<div class="not-found">⚠ Nenhum equipamento encontrado.</div>';
    return;
  }
  let html = items.length > 1 ? `<div class="result-count">${items.length} resultados encontrados</div>` : "";
  for (const r of items) {
    const desc = val(r.descricao);
    const barr = val(r.barramento);
    const col = val(r.coluna);
    const gav = val(r.gaveta);
    const tagDisplay = mode === "tag" ? highlight(r.tag, q) : r.tag;
    const descDisplay = desc === "*" ? "*" : (mode === "desc" ? highlight(desc, q) : desc);
    html += `
    <div class="card">
      <div class="card-tag-label"><span>Tag</span><span class="divider"></span></div>
      <div class="tag-value">${tagDisplay}</div>
      <div class="desc-block">
        <div class="field-label">Descrição</div>
        <div class="field-value ${desc === "*" ? "empty" : ""}">${descDisplay}</div>
      </div>
      <div class="grid">
        ${gridCell("Barramento", barr)}
        ${gridCell("Coluna", col)}
        ${gridCell("Gaveta", gav)}
      </div>
    </div>`;
  }
  resultsDiv.innerHTML = html;
}

function gridCell(label, value) {
  const isEmpty = value === "*";
  return `<div class="grid-cell">
    <div class="field-label">${label}</div>
    <div class="${isEmpty ? "big" : "normal"}">${value}</div>
  </div>`;
}
